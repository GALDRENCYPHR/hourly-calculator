<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hourly Pay Calculator</title>
  <link rel="stylesheet" href="style.css"/>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4417776413780958"
     crossorigin="anonymous"></script>
</head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-29LFT84G9Y"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-29LFT84G9Y');
</script>
<body>
  <header>
    <h2>⏱️ Hourly Pay Calculator</h2>
  </header>

  <main class="calculator-container">
    <div class="tabs" role="tablist">
      <button id="pay-tab-button"
              class="tab active"
              type="button"
              role="tab"
              aria-selected="true"
              aria-controls="pay-tab"
              data-tab-target="pay-tab">
        📋 Enter Your Details
      </button>
      <button id="hours-tab-button"
              class="tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="hours-tab"
              data-tab-target="hours-tab">
        ⏳ Calculate Your Hours
      </button>
      <div class="tab-underline" aria-hidden="true"></div>
    </div>

    <!-- Pay Calculation Tab -->
    <div id="pay-tab" class="tab-content" role="tabpanel" aria-labelledby="pay-tab-button">
      <form class="calculator-form" novalidate>
        <label for="hourly-rate">
          Hourly Rate
          <input id="hourly-rate" type="number" min="0" step="0.01" placeholder="$" inputmode="decimal" />
        </label>
        <label for="hours-worked">
          Hours Worked
          <input id="hours-worked" type="number" min="0" step="0.25" placeholder="e.g. 40" inputmode="decimal" />
        </label>
        <label for="overtime-hours">
          Overtime Hours
          <input id="overtime-hours" type="number" min="0" step="0.25" placeholder="e.g. 5" inputmode="decimal" />
        </label>
        <label for="deductions">
          Deductions
          <input id="deductions" type="number" min="0" step="0.01" placeholder="$" inputmode="decimal" />
        </label>
      </form>

      <div class="results" aria-live="polite">
        <p>Total Pay: <span id="total-pay">$0.00</span></p>
        <p><strong>Net Pay: <span id="net-pay">$0.00</span></strong></p>
      </div>
    </div>

    <!-- Hours Calculation Tab -->
    <div id="hours-tab" class="tab-content" style="display: none;" role="tabpanel" aria-labelledby="hours-tab-button" aria-hidden="true">
      <form class="calculator-form" novalidate>
        <label for="start-time">
          Start Time
          <input id="start-time" type="time" />
        </label>
        <label for="end-time">
          End Time
          <input id="end-time" type="time" />
        </label>
        <label for="break-duration">
          Break Duration (minutes)
          <input id="break-duration" type="number" min="0" step="5" placeholder="e.g. 30" inputmode="numeric" />
        </label>
      </form>

      <button id="calculate-hours-btn" type="button">Calculate Hours</button>

      <div class="results" aria-live="polite">
        <p>Calculated Hours: <span id="calculated-hours">0.00</span> hours</p>
      </div>
    </div>
    <p id="calculator-error" class="status-message" role="alert" aria-live="assertive"></p>
  </main>

  <footer>
    <p>Designed and built by <strong><a href="https://toluaina.com">Tolulope Aina</a></strong> ❤️</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
